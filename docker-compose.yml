services:
  postgres:
    image: postgres:16-alpine
    container_name: sistema_bancario_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: sistema_bancario
    ports:
      - "5432:5432"
    volumes:
      - sistema_bancario_postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/001-init-db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d sistema_bancario"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  sistema_bancario_postgres_data:
